<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>디지털 세계 시계</title>
  <link href='/style.css' rel='stylesheet'>
</head>
<body>
  <h1>디지털 세계 시계</h1>
  <div id="clocks-container">
    <digital-clock timezone="Asia/Seoul" city="서울"></digital-clock>
    <digital-clock timezone="America/New_York" city="뉴욕"></digital-clock>
  </div>
  <div id="buttons-container">
    <button id="add-world-clock">세계 시계 추가</button>
    <label id="hundredths-toggle">
      <input type="checkbox" id="show-hundredths" checked />
      1/100초 표시
    </label>
  </div>

  <!-- The Modal -->
  <div id="city-modal" class="modal">
    <!-- Modal content -->
    <div class="modal-content">
      <span class="close-button">&times;</span>
      <h2>도시 선택</h2>
      <div id="modal-city-list"></div>
    </div>
  </div>

  <script defer type="text/javascript" src="/main.js"></script>
</body>
</html>
